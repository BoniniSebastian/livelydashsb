<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#050b12" />
  <title>livelydashsb</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bgBase"></div>
  <div class="blob blobMain"></div>
  <div class="vignette"></div>

  <button id="qrDock" class="qrDock" type="button" aria-label="Visa QR">
    <canvas id="qrCanvasMini" width="72" height="72"></canvas>
  </button>

  <main class="appShell">
    <aside class="hud" aria-label="Status">
      <div class="hudTop">
        <div class="clockWrap">
          <div id="timeBig" class="timeBig">11:14</div>
          <div id="dateBig" class="dateBig">Onsdag - 1 april</div>
        </div>

        <div class="profileWrap">
          <button id="profileCircleBtn" class="profileCircleBtn" type="button" aria-label="Välj profil">
            <span id="profileCircleText">SB</span>
          </button>

          <div class="profileLine">
            <button id="profileTabSB" class="profileMiniBtn active" type="button">SB</button>
            <span class="profileDot">•</span>
            <button id="profileTabJA" class="profileMiniBtn" type="button">JA</button>
          </div>
        </div>
      </div>

      <div class="hudBottom">
        <button id="refreshBtn" class="refreshBtn" type="button" aria-label="Uppdatera">↻</button>

        <div id="weatherAmbient" class="weatherAmbient">
          <div class="weatherIconDot"></div>
          <div class="weatherText">
            <div id="weatherTemp" class="weatherTemp">--°</div>
            <div id="weatherLabel" class="weatherLabel">Laddar väder</div>
            <div id="weatherMeta" class="weatherMeta">...</div>
          </div>
        </div>
      </div>
    </aside>

    <section class="board" aria-label="Dashboard">
      <button id="freeTextCard" class="widget glass cardFreeText" type="button">
        <div class="widgetTitle">Fritext</div>
        <div id="freeTextPreview" class="widgetTextPreview">Tryck för att skriva.</div>
      </button>

      <button id="listsCard" class="widget glass cardLists" type="button">
        <div class="widgetTitle">Listor</div>
        <div id="listsPreview" class="listsPreview"></div>
      </button>

      <section id="timerCard" class="widget glass cardTimer" tabindex="0" aria-label="Timer">
        <div class="timerArea">
          <div class="timerRingWrap">
            <svg class="timerSvg" viewBox="0 0 220 220" aria-hidden="true">
              <defs>
                <linearGradient id="timerStroke" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#5cefff"></stop>
                  <stop offset="50%" stop-color="#d850ff"></stop>
                  <stop offset="100%" stop-color="#ff8b3e"></stop>
                </linearGradient>
              </defs>
              <circle class="timerTrack" cx="110" cy="110" r="94"></circle>
              <circle id="timerProgress" class="timerProgress" cx="110" cy="110" r="94"></circle>
            </svg>

            <div class="timerCenter">
              <div class="timerMiniLabel">TIMER</div>
              <div id="timerPresetText" class="timerPresetText">5m</div>
              <div id="timerStatus" class="timerStatus">Tryck för att starta</div>
            </div>
          </div>
        </div>
      </section>

      <button id="imageOneCard" class="widget imageCard cardImageOne" type="button" aria-label="Bild 1">
        <img id="imageOnePreview" class="imagePreview hidden" alt="Bild 1" />
        <div id="imageOnePlaceholder" class="imagePlaceholder">
          <div class="imagePlaceholderLabel">Bild 1</div>
          <div class="imagePlaceholderSub">Tryck för att lägga till</div>
        </div>
      </button>

      <button id="imageTwoCard" class="widget imageCard cardImageTwo" type="button" aria-label="Bild 2">
        <img id="imageTwoPreview" class="imagePreview hidden" alt="Bild 2" />
        <div id="imageTwoPlaceholder" class="imagePlaceholder">
          <div class="imagePlaceholderLabel">Bild 2</div>
          <div class="imagePlaceholderSub">Tryck för att lägga till</div>
        </div>
      </button>

      <button id="notesCard" class="widget glass cardNotes" type="button">
        <div class="widgetTitle">Anteckningar</div>
        <div id="notesPreview" class="notesPreview"></div>
      </button>

      <button id="noticesCard" class="widget solid solidPink cardNotices" type="button">
        <div class="widgetTitle">Familjenotiser</div>
        <div id="noticesPreview" class="solidPreview"></div>
      </button>

      <button id="trainingsCard" class="widget solid solidBlue cardTrainings" type="button">
        <div class="widgetTitle">Träningar</div>
        <div id="trainingsPreview" class="solidPreview"></div>
      </button>

      <button id="matchesCard" class="widget solid solidBlue cardMatches" type="button">
        <div class="widgetTitle">Matcher</div>
        <div id="matchesPreview" class="solidPreview"></div>
      </button>

      <section class="widget solid solidBlue cardCalendar" aria-label="Google Kalender">
        <div class="widgetTitle">Idag</div>
        <div id="calendarTodayPreview" class="calendarPreview"></div>
      </section>
    </section>
  </main>

  <div id="modalRoot" class="modalRoot hidden" aria-hidden="true">
    <div class="modalBackdrop"></div>

    <div class="modalPanel">
      <div class="modalHead">
        <div>
          <div class="modalMini">WIDGET</div>
          <h2 id="modalTitle">Redigera</h2>
        </div>
        <button id="modalCloseBtn" class="modalCloseBtn" type="button" aria-label="Stäng">✕</button>
      </div>

      <div id="modalBody" class="modalBody"></div>

      <div class="modalFoot">
        <button id="modalDeleteBtn" class="ghostBtn hidden" type="button">Rensa</button>
        <button id="modalSaveBtn" class="mainBtn" type="button">Spara</button>
      </div>
    </div>
  </div>

  <div id="profileModalRoot" class="modalRoot hidden" aria-hidden="true">
    <div class="modalBackdrop"></div>

    <div class="profileModalPanel">
      <div class="modalHead compact">
        <div>
          <div class="modalMini">PROFIL</div>
          <h2>Välj profil</h2>
        </div>
        <button id="profileModalCloseBtn" class="modalCloseBtn" type="button" aria-label="Stäng">✕</button>
      </div>

      <div class="profileModalBody">
        <button data-profile-pick="SB" class="profilePickBtn" type="button">SB</button>
        <button data-profile-pick="JA" class="profilePickBtn" type="button">JA</button>
      </div>
    </div>
  </div>

  <div id="qrModalRoot" class="modalRoot hidden" aria-hidden="true">
    <div class="modalBackdrop"></div>

    <div class="profileModalPanel qrPanel">
      <div class="modalHead compact">
        <div>
          <div class="modalMini">QR</div>
          <h2>Scanna för att öppna</h2>
        </div>
        <button id="qrModalCloseBtn" class="modalCloseBtn" type="button" aria-label="Stäng">✕</button>
      </div>

      <div class="qrModalBody">
        <canvas id="qrCanvasLarge" width="240" height="240"></canvas>
        <div id="qrUrlText" class="qrUrlText"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
