<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#050b12">
  <title>Gamevibe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="blob"></div>

  <div class="app">
    <header class="top">
      <div>
        <h1>Gamevibe</h1>
        <div id="match">Ingen omgång</div>
      </div>

      <div class="actions">
        <button id="qrBtn" class="iconBtn" type="button">QR</button>
        <button id="adminBtn" class="iconBtn" type="button">⚙</button>
      </div>
    </header>

    <button id="addBtn" class="mainBtn" type="button">+ Kupong</button>

    <div id="list"></div>
  </div>

  <!-- Kupong popup -->
  <div id="couponModal" class="modal hidden">
    <div class="modalBackdrop"></div>

    <div class="modalCard">
      <div class="modalHead">
        <div>
          <div class="miniLabel">KUPONG</div>
          <h2>Din kupong</h2>
        </div>
        <button id="closeModalBtn" class="iconBtn" type="button">✕</button>
      </div>

      <div class="modalBody">
        <label class="field">
          <span>Namn</span>
          <input id="nameInput" type="text" placeholder="Skriv ditt namn">
        </label>

        <label class="field">
          <span>Lag som gör första målet · 100p</span>
          <select id="bet1">
            <option value="">Välj</option>
            <option value="home">Hemmalag</option>
            <option value="away">Bortalag</option>
          </select>
        </label>

        <label class="field">
          <span>Vinner hemmalaget matchen · 100p</span>
          <select id="bet2">
            <option value="">Välj</option>
            <option value="yes">Ja</option>
            <option value="no">Nej</option>
          </select>
        </label>
      </div>

      <div class="modalFoot">
        <button id="saveCouponBtn" class="mainBtn" type="button">Spara / Lock in</button>
      </div>
    </div>
  </div>

  <!-- Detalj popup -->
  <div id="detailModal" class="modal hidden">
    <div class="detailBackdrop"></div>

    <div class="modalCard">
      <div class="modalHead">
        <div>
          <div class="miniLabel">DETALJER</div>
          <h2 id="detailName">Kupong</h2>
        </div>
        <button id="closeDetailBtn" class="iconBtn" type="button">✕</button>
      </div>

      <div class="modalBody">
        <div class="summaryCard">
          <div class="summaryItem">
            <div class="summaryLabel">Poäng</div>
            <div id="detailScore" class="summaryValue">0 p</div>
          </div>
          <div class="summaryItem">
            <div class="summaryLabel">Status</div>
            <div id="detailStatus" class="summaryValue">-</div>
          </div>
        </div>

        <div id="detailBreakdown" class="detailBreakdown"></div>
      </div>
    </div>
  </div>

  <!-- Admin popup -->
  <div id="adminModal" class="modal hidden">
    <div class="adminBackdrop"></div>

    <div class="modalCard adminCard">
      <div class="modalHead">
        <div>
          <div class="miniLabel">ADMIN</div>
          <h2>Skapa omgång</h2>
        </div>
        <button id="closeAdminBtn" class="iconBtn" type="button">✕</button>
      </div>

      <div class="modalBody">
        <div class="adminSection">
          <div class="adminSectionTitle">Match</div>

          <label class="field">
            <span>Omgångsnamn</span>
            <input id="roundTitleInput" type="text" placeholder="T.ex. Fredagsmatchen">
          </label>

          <label class="field">
            <span>Matchlänk</span>
            <input id="matchLinkInput" type="text" placeholder="Klistra in matchlänken här">
          </label>

          <div class="grid2">
            <label class="field">
              <span>Hemmalag</span>
              <input id="homeTeamInput" type="text" placeholder="Hemmalag">
            </label>

            <label class="field">
              <span>Bortalag</span>
              <input id="awayTeamInput" type="text" placeholder="Bortalag">
            </label>
          </div>
        </div>

        <div class="adminSection dangerSection">
          <div class="adminSectionTitle">Farligt</div>
          <div class="adminDangerText">
            Nollställ omgång raderar deltagare, kuponger och omgångsinfo.
          </div>
        </div>
      </div>

      <div class="modalFoot adminFoot">
        <button id="resetRoundBtn" class="ghostBtn" type="button">Nollställ omgång</button>
        <button id="saveAdminBtn" class="mainBtn" type="button">Spara omgång</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
